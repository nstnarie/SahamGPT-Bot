name: Scrape Historical Broker Summary

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
        default: "2024-01-01"
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true
        default: "2024-03-31"
      batch:
        description: "Ticker batch (1=first 25, 2=next 25, 3=next 25, 4=rest, all=all tickers)"
        required: true
        default: "1"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install requests

      # ── FIXED: Added GH_TOKEN so gh CLI can download artifact from previous run ──
      # ── FIXED: Using gh api instead of gh run download-artifact ──
      - name: Download database artifact
        uses: actions/download-artifact@v4
        with:
          name: idx-database
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Restore database
        run: |
          python3 << 'EOF'
          import sqlite3, os, shutil

          OUTPUT = "idx_swing_trader.db"
          PART_A = "idx_broker_part_a.db"
          PART_B = "idx_broker_part_b.db"

          if os.path.exists(OUTPUT):
              count = sqlite3.connect(OUTPUT).execute(
                  "SELECT COUNT(*) FROM broker_summary"
              ).fetchone()[0]
              if count > 400000:
                  print(f"✅ Artifact restored: {count:,} records")
                  exit(0)
              print(f"⚠️ Artifact only has {count:,} records — rebuilding from split files")

          if not os.path.exists(PART_A) or not os.path.exists(PART_B):
              print("❌ FATAL: No artifact and no split files found. Cannot proceed.")
              exit(1)

          print("Rebuilding DB from split files...")
          shutil.copy(PART_A, OUTPUT)
          conn = sqlite3.connect(OUTPUT)
          conn.execute(f"ATTACH DATABASE '{PART_B}' AS part_b")
          conn.execute("""
              INSERT OR IGNORE INTO broker_summary
                  (ticker, date, broker_code, broker_type,
                   buy_value, sell_value, buy_volume, sell_volume, net_value, net_volume)
              SELECT ticker, date, broker_code, broker_type,
                     buy_value, sell_value, buy_volume, sell_volume, net_value, net_volume
              FROM part_b.broker_summary
          """)
          conn.commit()
          conn.execute("DETACH DATABASE part_b")
          count = conn.execute("SELECT COUNT(*) FROM broker_summary").fetchone()[0]
          conn.close()
          print(f"✅ Rebuilt from split files: {count:,} records")
          EOF

      - name: Run historical broker summary scrape
        env:
          STOCKBIT_TOKEN: ${{ secrets.STOCKBIT_TOKEN }}
        run: |
          python3 << 'EOF'
          import os
          import sys
          import logging

          logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")

          from config import DATABASE_URL
          from database.schema import create_all_tables, get_session
          from scraper.price_scraper import LQ45_TICKERS
          from scraper.broker_scraper import StockbitBrokerScraper

          # Create tables
          engine = create_all_tables(DATABASE_URL)
          session = get_session(engine)

          # Select ticker batch (to stay within GitHub Actions time limit)
          batch = "${{ github.event.inputs.batch }}"
          tickers = LQ45_TICKERS

          if batch == "1":
              tickers = tickers[:25]
              print(f"Batch 1: tickers 1-25 ({tickers[0]} to {tickers[-1]})")
          elif batch == "2":
              tickers = tickers[25:50]
              print(f"Batch 2: tickers 26-50 ({tickers[0]} to {tickers[-1]})")
          elif batch == "3":
              tickers = tickers[50:75]
              print(f"Batch 3: tickers 51-75 ({tickers[0]} to {tickers[-1]})")
          elif batch == "4":
              tickers = tickers[75:]
              print(f"Batch 4: tickers 76+ ({tickers[0]} to {tickers[-1]})")
          else:
              print(f"All tickers: {len(tickers)} stocks")

          start_date = "${{ github.event.inputs.start_date }}"
          end_date = "${{ github.event.inputs.end_date }}"

          print(f"Scraping broker summary: {start_date} to {end_date}")
          print(f"Tickers: {len(tickers)}")

          scraper = StockbitBrokerScraper()
          if not scraper.login():
              print("ERROR: Failed to login to Stockbit")
              sys.exit(1)

          results = scraper.scrape_historical(
              session=session,
              tickers=tickers,
              start_date=start_date,
              end_date=end_date,
              skip_existing=True,
          )

          total = sum(results.values())
          print(f"\nDone! Total broker records stored: {total}")
          for ticker, count in sorted(results.items(), key=lambda x: -x[1])[:10]:
              print(f"  {ticker}: {count} records")

          session.close()
          EOF

      # ── CHANGED: Check record count BEFORE saving artifact ──
      # This prevents an empty/failed DB from overwriting your good artifact.
      - name: Check if data was scraped
        id: check_data
        run: |
          python3 << 'EOF'
          import sqlite3, os
          conn = sqlite3.connect('idx_swing_trader.db')
          count = conn.execute('SELECT COUNT(*) FROM broker_summary').fetchone()[0]
          conn.close()
          print(f'Records in database: {count}')
          has_data = 'true' if count > 0 else 'false'
          if count > 0:
              print('DATA_OK=true')
          else:
              print('DATA_OK=false')
              print('WARNING: No data in database. Skipping artifact save to protect previous data.')
          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
              f.write(f'has_data={has_data}\n')
          EOF

      # ── CHANGED: Only save artifact if DB actually has data ──
      - name: Save database
        if: steps.check_data.outputs.has_data == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: idx-database
          path: idx_swing_trader.db
          retention-days: 90
          overwrite: true

      # ── CHANGED: Only verify if DB actually has data ──
      - name: Verify scraped data
        if: steps.check_data.outputs.has_data == 'true'
        run: |
          cd $GITHUB_WORKSPACE
          python3 verify_broker_data.py

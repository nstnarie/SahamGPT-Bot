name: Run Backtest

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date"
        required: true
        default: "2021-01-01"
      end_date:
        description: "End date"
        required: true
        default: "2025-12-31"
      capital:
        description: "Starting capital (IDR)"
        required: true
        default: "1000000000"
      real_broker:
        description: "Use real Asing broker data (true/false)"
        required: false
        default: "false"

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install openpyxl

      - name: Download database
        uses: dawidd6/action-download-artifact@v6
        with:
          name: idx-database
          path: .
          if_no_artifact_found: warn
          workflow_conclusion: ""
          search_artifacts: true
        continue-on-error: true

      - name: Check if database exists
        id: check_db
        run: |
          if [ -f idx_swing_trader.db ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Merge broker data from split files if needed
        if: steps.check_db.outputs.exists == 'true'
        run: |
          python3 << 'EOF'
          import sqlite3, os

          DB = "idx_swing_trader.db"
          PART_A = "idx_broker_part_a.db"
          PART_B = "idx_broker_part_b.db"

          conn = sqlite3.connect(DB)
          count = conn.execute("SELECT COUNT(*) FROM broker_summary").fetchone()[0]
          conn.close()

          if count > 0:
              print(f"broker_summary already has {count:,} records — skipping merge")
              exit(0)

          print("broker_summary is empty — merging from split files...")

          if not os.path.exists(PART_A) or not os.path.exists(PART_B):
              print("Split files not found in repo — cannot merge, proceeding without broker data")
              exit(0)

          conn = sqlite3.connect(DB)
          for part in [PART_A, PART_B]:
              conn.execute(f"ATTACH DATABASE '{part}' AS part_db")
              cur = conn.execute("""
                  INSERT OR IGNORE INTO broker_summary
                      (ticker, date, broker_code, broker_type,
                       buy_value, sell_value, buy_volume, sell_volume, net_value, net_volume)
                  SELECT ticker, date, broker_code, broker_type,
                         buy_value, sell_value, buy_volume, sell_volume, net_value, net_volume
                  FROM part_db.broker_summary
              """)
              print(f"  Inserted from {part}: {cur.rowcount:,} records")
              conn.commit()
              conn.execute("DETACH DATABASE part_db")

          total = conn.execute("SELECT COUNT(*) FROM broker_summary").fetchone()[0]
          conn.close()
          print(f"Final broker_summary: {total:,} records")
          EOF

      - name: Backfill missing price data
        if: steps.check_db.outputs.exists == 'true'
        run: |
          python3 << 'EOF'
          import sqlite3, time
          import yfinance as yf
          from datetime import date

          DB = "idx_swing_trader.db"
          START = "2021-01-01"

          conn = sqlite3.connect(DB)

          # Find tickers with broker data but no price data
          missing = conn.execute("""
              SELECT DISTINCT b.ticker
              FROM broker_summary b
              LEFT JOIN daily_prices d ON b.ticker = d.ticker
              WHERE d.ticker IS NULL
              ORDER BY b.ticker
          """).fetchall()
          missing = [r[0] for r in missing]
          conn.close()

          if not missing:
              print("All tickers have price data — skipping backfill")
              exit(0)

          print(f"Backfilling price data for: {missing}")

          conn = sqlite3.connect(DB)
          for ticker in missing:
              yf_ticker = f"{ticker}.JK"
              print(f"  Fetching {yf_ticker}...")
              try:
                  df = yf.Ticker(yf_ticker).history(
                      start=START, end=date.today().isoformat(), auto_adjust=False
                  )
                  if df.empty:
                      print(f"    No data from Yahoo Finance for {yf_ticker}")
                      continue

                  df = df.reset_index()
                  df.columns = [c.lower().replace(" ", "_") for c in df.columns]
                  if "date" in df.columns:
                      df["date"] = df["date"].dt.strftime("%Y-%m-%d")
                  if "adj_close" not in df.columns:
                      df["adj_close"] = df["close"]
                  df["value"] = df["close"] * df["volume"]
                  df = df.dropna(subset=["close"])

                  inserted = 0
                  for _, row in df.iterrows():
                      try:
                          conn.execute("""
                              INSERT OR IGNORE INTO daily_prices
                                  (ticker, date, open, high, low, close, volume, value, adj_close)
                              VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?)
                          """, (
                              ticker, row["date"],
                              float(row.get("open") or 0),
                              float(row.get("high") or 0),
                              float(row.get("low") or 0),
                              float(row.get("close") or 0),
                              float(row.get("volume") or 0),
                              float(row.get("value") or 0),
                              float(row.get("adj_close") or row.get("close") or 0),
                          ))
                          inserted += 1
                      except Exception as e:
                          pass
                  conn.commit()
                  print(f"    Inserted {inserted} rows for {ticker}")
                  time.sleep(1)

              except Exception as e:
                  print(f"    Failed to fetch {yf_ticker}: {e}")

          conn.close()
          print("Backfill complete")
          EOF

      - name: Scrape data (if no database)
        if: steps.check_db.outputs.exists == 'false'
        run: |
          python main_backtest.py \
            --scrape \
            --start ${{ github.event.inputs.start_date }} \
            --end ${{ github.event.inputs.end_date }} \
            --capital ${{ github.event.inputs.capital }} \
            --output reports

      - name: Run backtest (if database exists)
        if: steps.check_db.outputs.exists == 'true'
        run: |
          python main_backtest.py \
            --start ${{ github.event.inputs.start_date }} \
            --end ${{ github.event.inputs.end_date }} \
            --capital ${{ github.event.inputs.capital }} \
            --output reports \
            ${{ github.event.inputs.real_broker == 'true' && '--real-broker' || '' }}

      - name: Create Excel trade log
        run: |
          python << 'PYEOF'
          import pandas as pd
          import os

          csv_path = "reports/trade_log.csv"
          xlsx_path = "reports/trade_log.xlsx"

          if not os.path.exists(csv_path):
              print("No trade log CSV found")
              exit(0)

          df = pd.read_csv(csv_path)
          if df.empty:
              print("Trade log is empty")
              exit(0)

          df = df.sort_values("entry_date")

          for col in ["entry_price", "exit_price", "pnl", "entry_cost", "exit_proceeds"]:
              if col in df.columns:
                  df[col] = pd.to_numeric(df[col], errors="coerce").round(0)
          if "pnl_pct" in df.columns:
              df["pnl_pct"] = pd.to_numeric(df["pnl_pct"], errors="coerce").round(2)

          with pd.ExcelWriter(xlsx_path, engine="openpyxl") as writer:
              df.to_excel(writer, sheet_name="Trades", index=False)
              ws = writer.sheets["Trades"]
              for col_idx, col in enumerate(df.columns, 1):
                  max_len = max(len(str(col)), df[col].astype(str).str.len().max())
                  from openpyxl.utils import get_column_letter
                  ws.column_dimensions[get_column_letter(col_idx)].width = min(max_len + 3, 25)

          print(f"Excel created: {len(df)} trades")
          PYEOF

      - name: Save database
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: idx-database
          path: idx_swing_trader.db
          retention-days: 90
          overwrite: true

      - name: Save backtest results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-${{ github.event.inputs.start_date }}-to-${{ github.event.inputs.end_date }}
          path: |
            reports/metrics_summary.txt
            reports/trade_log.csv
            reports/trade_log.xlsx
            reports/equity_curve.png
            reports/drawdown.png
            reports/monthly_heatmap.png
            reports/trade_distribution.png
          retention-days: 90

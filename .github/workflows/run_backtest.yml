name: Run Backtest

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date"
        required: true
        default: "2021-01-01"
      end_date:
        description: "End date"
        required: true
        default: "2025-12-31"
      capital:
        description: "Starting capital (IDR)"
        required: true
        default: "1000000000"
      real_broker:
        description: "Use real Asing broker data (true/false)"
        required: false
        default: "false"

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install openpyxl

      - name: Download database
        uses: dawidd6/action-download-artifact@v6
        with:
          name: idx-database
          path: .
          if_no_artifact_found: warn
          workflow_conclusion: ""
          search_artifacts: true
        continue-on-error: true

      - name: Check if database exists
        id: check_db
        run: |
          if [ -f idx_swing_trader.db ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Get latest split files from main
        if: steps.check_db.outputs.exists == 'true'
        run: |
          git fetch origin main
          git checkout origin/main -- idx_broker_part_a.db idx_broker_part_b.db
          echo "Split files fetched from origin/main"

      - name: Merge broker data from split files if needed
        if: steps.check_db.outputs.exists == 'true'
        run: |
          python3 << 'EOF'
          import sqlite3, os

          DB = "idx_swing_trader.db"
          PART_A = "idx_broker_part_a.db"
          PART_B = "idx_broker_part_b.db"

          if not os.path.exists(PART_A) or not os.path.exists(PART_B):
              print("Split files not found — cannot verify or merge, proceeding without broker data")
              exit(0)

          # Get authoritative total from split files
          split_a = sqlite3.connect(PART_A).execute("SELECT COUNT(*) FROM broker_summary").fetchone()[0]
          split_b = sqlite3.connect(PART_B).execute("SELECT COUNT(*) FROM broker_summary").fetchone()[0]
          split_total = split_a + split_b
          print(f"Split files: {split_a:,} + {split_b:,} = {split_total:,} records")

          conn = sqlite3.connect(DB)
          count = conn.execute("SELECT COUNT(*) FROM broker_summary").fetchone()[0]
          conn.close()

          if count >= split_total:
              print(f"broker_summary has {count:,} records (>= split total) — skipping merge")
              exit(0)

          print(f"broker_summary has {count:,} records (< split total {split_total:,}) — merging from split files...")

          conn = sqlite3.connect(DB)
          for part in [PART_A, PART_B]:
              conn.execute(f"ATTACH DATABASE '{part}' AS part_db")
              cur = conn.execute("""
                  INSERT OR IGNORE INTO broker_summary
                      (ticker, date, broker_code, broker_type,
                       buy_value, sell_value, buy_volume, sell_volume, net_value, net_volume)
                  SELECT ticker, date, broker_code, broker_type,
                         buy_value, sell_value, buy_volume, sell_volume, net_value, net_volume
                  FROM part_db.broker_summary
              """)
              print(f"  Inserted from {part}: {cur.rowcount:,} records")
              conn.commit()
              conn.execute("DETACH DATABASE part_db")

          total = conn.execute("SELECT COUNT(*) FROM broker_summary").fetchone()[0]
          conn.close()
          print(f"Final broker_summary: {total:,} records")
          EOF

      - name: Backfill missing price data
        if: steps.check_db.outputs.exists == 'true'
        run: |
          python3 << 'EOF'
          import sqlite3, time
          import yfinance as yf
          from datetime import date, timedelta

          DB = "idx_swing_trader.db"
          START = "2021-01-01"

          # Warmup window: 5 months (~150 days) before backtest start.
          # Tickers with no price data going back this far are treated as missing.
          backtest_start = "${{ github.event.inputs.start_date }}"
          try:
              from datetime import datetime
              warmup_dt = datetime.strptime(backtest_start, "%Y-%m-%d").date() - timedelta(days=150)
              warmup_start = warmup_dt.strftime("%Y-%m-%d")
          except Exception:
              warmup_start = "2023-01-01"
          print(f"Backtest start: {backtest_start}, warmup start: {warmup_start}")

          conn = sqlite3.connect(DB)

          # Ensure daily_prices table exists before querying it
          conn.execute("""
              CREATE TABLE IF NOT EXISTS daily_prices (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  ticker TEXT NOT NULL,
                  date TEXT NOT NULL,
                  open REAL, high REAL, low REAL, close REAL,
                  volume REAL, value REAL, adj_close REAL,
                  UNIQUE(ticker, date)
              )
          """)
          conn.commit()

          backtest_end = "${{ github.event.inputs.end_date }}"

          # Find tickers with broker data but no price data inside the backtest window
          # [warmup_start, end_date]. Checking BOTH bounds catches tickers that only
          # have 2025-only data when the backtest period ends in 2024 or earlier.
          missing = conn.execute(f"""
              SELECT DISTINCT b.ticker
              FROM broker_summary b
              LEFT JOIN (
                  SELECT DISTINCT ticker FROM daily_prices
                  WHERE date >= '{warmup_start}' AND date <= '{backtest_end}'
              ) d ON b.ticker = d.ticker
              WHERE d.ticker IS NULL
              ORDER BY b.ticker
          """).fetchall()
          missing = [r[0] for r in missing]
          conn.close()

          if not missing:
              print("All tickers have price data in the required date range — skipping backfill")
              exit(0)

          print(f"Backfilling price data for {len(missing)} tickers: {missing}")

          conn = sqlite3.connect(DB)
          for ticker in missing:
              yf_ticker = f"{ticker}.JK"
              print(f"  Fetching {yf_ticker}...")
              try:
                  df = yf.Ticker(yf_ticker).history(
                      start=START, end=date.today().isoformat(), auto_adjust=False
                  )
                  if df.empty:
                      print(f"    No data from Yahoo Finance for {yf_ticker}")
                      continue

                  df = df.reset_index()
                  df.columns = [c.lower().replace(" ", "_") for c in df.columns]

                  # Normalise date column — yfinance may return "date" or "datetime"
                  if "date" in df.columns:
                      df["date"] = df["date"].apply(
                          lambda x: x.strftime("%Y-%m-%d") if hasattr(x, "strftime") else str(x)[:10]
                      )
                  elif "datetime" in df.columns:
                      df["date"] = df["datetime"].apply(
                          lambda x: x.strftime("%Y-%m-%d") if hasattr(x, "strftime") else str(x)[:10]
                      )
                  else:
                      print(f"    Cannot find date column for {yf_ticker}, skipping")
                      continue

                  if "adj_close" not in df.columns:
                      df["adj_close"] = df["close"]
                  df["value"] = df["close"] * df["volume"]
                  df = df.dropna(subset=["close"])

                  inserted = 0
                  for _, row in df.iterrows():
                      try:
                          conn.execute("""
                              INSERT OR IGNORE INTO daily_prices
                                  (ticker, date, open, high, low, close, volume, value, adj_close)
                              VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?)
                          """, (
                              ticker, row["date"],
                              float(row.get("open") or 0),
                              float(row.get("high") or 0),
                              float(row.get("low") or 0),
                              float(row.get("close") or 0),
                              float(row.get("volume") or 0),
                              float(row.get("value") or 0),
                              float(row.get("adj_close") or row.get("close") or 0),
                          ))
                          inserted += 1
                      except Exception as e:
                          pass
                  conn.commit()
                  print(f"    Inserted {inserted} rows for {ticker}")
                  time.sleep(1)

              except Exception as e:
                  print(f"    Failed to fetch {yf_ticker}: {e}")

          conn.close()
          print("Backfill complete")

          # ── IHSG backfill ──
          # Backfill index_daily if there is no IHSG data inside the backtest window.
          conn = sqlite3.connect(DB)
          conn.execute("""
              CREATE TABLE IF NOT EXISTS index_daily (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  index_code TEXT NOT NULL DEFAULT 'IHSG',
                  date TEXT NOT NULL,
                  open REAL, high REAL, low REAL, close REAL, volume REAL,
                  UNIQUE(index_code, date)
              )
          """)
          conn.commit()
          ihsg_count = conn.execute(f"""
              SELECT COUNT(*) FROM index_daily
              WHERE index_code = 'IHSG'
                AND date >= '{warmup_start}' AND date <= '{backtest_end}'
          """).fetchone()[0]
          conn.close()

          if ihsg_count > 0:
              print(f"IHSG: {ihsg_count} rows in backtest window — skipping")
          else:
              print("IHSG missing in backtest window — backfilling from Yahoo Finance...")
              try:
                  df = yf.Ticker("^JKSE").history(
                      start=START, end=date.today().isoformat(), auto_adjust=False
                  )
                  if df.empty:
                      print("  No IHSG data from Yahoo Finance")
                  else:
                      df = df.reset_index()
                      df.columns = [c.lower().replace(" ", "_") for c in df.columns]
                      if "date" in df.columns:
                          df["date"] = df["date"].apply(
                              lambda x: x.strftime("%Y-%m-%d") if hasattr(x, "strftime") else str(x)[:10]
                          )
                      elif "datetime" in df.columns:
                          df["date"] = df["datetime"].apply(
                              lambda x: x.strftime("%Y-%m-%d") if hasattr(x, "strftime") else str(x)[:10]
                          )
                      df = df.dropna(subset=["close"])
                      conn = sqlite3.connect(DB)
                      inserted = 0
                      for _, row in df.iterrows():
                          try:
                              conn.execute("""
                                  INSERT OR IGNORE INTO index_daily
                                      (index_code, date, open, high, low, close, volume)
                                  VALUES (?, ?, ?, ?, ?, ?, ?)
                              """, (
                                  "IHSG", row["date"],
                                  float(row.get("open") or 0),
                                  float(row.get("high") or 0),
                                  float(row.get("low") or 0),
                                  float(row.get("close") or 0),
                                  float(row.get("volume") or 0),
                              ))
                              inserted += 1
                          except Exception:
                              pass
                      conn.commit()
                      conn.close()
                      print(f"  Inserted {inserted} IHSG rows")
              except Exception as e:
                  print(f"  IHSG backfill failed: {e}")
          EOF

      - name: Scrape data (if no database)
        if: steps.check_db.outputs.exists == 'false'
        run: |
          python main_backtest.py \
            --scrape \
            --start ${{ github.event.inputs.start_date }} \
            --end ${{ github.event.inputs.end_date }} \
            --capital ${{ github.event.inputs.capital }} \
            --output reports

      - name: Run backtest (if database exists)
        if: steps.check_db.outputs.exists == 'true'
        run: |
          python main_backtest.py \
            --start ${{ github.event.inputs.start_date }} \
            --end ${{ github.event.inputs.end_date }} \
            --capital ${{ github.event.inputs.capital }} \
            --output reports \
            ${{ github.event.inputs.real_broker == 'true' && '--real-broker' || '' }}

      - name: Create Excel trade log
        run: |
          python << 'PYEOF'
          import pandas as pd
          import os

          csv_path = "reports/trade_log.csv"
          xlsx_path = "reports/trade_log.xlsx"

          if not os.path.exists(csv_path):
              print("No trade log CSV found")
              exit(0)

          df = pd.read_csv(csv_path)
          if df.empty:
              print("Trade log is empty")
              exit(0)

          df = df.sort_values("entry_date")

          for col in ["entry_price", "exit_price", "pnl", "entry_cost", "exit_proceeds"]:
              if col in df.columns:
                  df[col] = pd.to_numeric(df[col], errors="coerce").round(0)
          if "pnl_pct" in df.columns:
              df["pnl_pct"] = pd.to_numeric(df["pnl_pct"], errors="coerce").round(2)

          with pd.ExcelWriter(xlsx_path, engine="openpyxl") as writer:
              df.to_excel(writer, sheet_name="Trades", index=False)
              ws = writer.sheets["Trades"]
              for col_idx, col in enumerate(df.columns, 1):
                  max_len = max(len(str(col)), df[col].astype(str).str.len().max())
                  from openpyxl.utils import get_column_letter
                  ws.column_dimensions[get_column_letter(col_idx)].width = min(max_len + 3, 25)

          print(f"Excel created: {len(df)} trades")
          PYEOF

      - name: Save database
        uses: actions/upload-artifact@v4
        if: always() && github.ref == 'refs/heads/main'
        with:
          name: idx-database
          path: idx_swing_trader.db
          retention-days: 90
          overwrite: true

      - name: Save backtest results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-${{ github.event.inputs.start_date }}-to-${{ github.event.inputs.end_date }}
          path: |
            reports/metrics_summary.txt
            reports/trade_log.csv
            reports/trade_log.xlsx
            reports/equity_curve.png
            reports/drawdown.png
            reports/monthly_heatmap.png
            reports/trade_distribution.png
          retention-days: 90

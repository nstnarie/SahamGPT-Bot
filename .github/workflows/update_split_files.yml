name: Update Split Files

on:
  workflow_dispatch:

jobs:
  split:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download database artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: scrape_broker_summary.yml
          name: idx-database
          path: .
          if_no_artifact_found: error

      - name: Verify source database
        run: |
          python3 << 'EOF'
          import sqlite3, os, sys

          SOURCE = "idx_swing_trader.db"
          if not os.path.exists(SOURCE):
              print("FATAL: idx_swing_trader.db not found.")
              sys.exit(1)

          conn = sqlite3.connect(SOURCE)
          bs_count = conn.execute("SELECT COUNT(*) FROM broker_summary").fetchone()[0]
          min_d, max_d = conn.execute("SELECT MIN(date), MAX(date) FROM broker_summary").fetchone()
          tickers = conn.execute("SELECT COUNT(DISTINCT ticker) FROM broker_summary").fetchone()[0]
          conn.close()
          print(f"broker_summary: {bs_count:,} records | {tickers} tickers | {min_d} → {max_d}")

          if bs_count < 1_000_000:
              print(f"FATAL: broker_summary has only {bs_count:,} records — refusing to overwrite split files with partial data")
              sys.exit(1)
          EOF

      - name: Aggregate broker_summary into foreign_flow
        run: |
          python3 << 'EOF'
          import sqlite3, os

          SOURCE = "idx_swing_trader.db"
          conn = sqlite3.connect(SOURCE)

          # Ensure foreign_flow table exists
          conn.execute("""
              CREATE TABLE IF NOT EXISTS foreign_flow (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  ticker TEXT NOT NULL,
                  date TEXT NOT NULL,
                  net_foreign_value REAL,
                  net_foreign_volume REAL,
                  foreign_buy_value REAL,
                  foreign_sell_value REAL,
                  UNIQUE(ticker, date)
              )
          """)
          conn.commit()

          # Get date range of broker_summary to replace
          min_d, max_d = conn.execute("SELECT MIN(date), MAX(date) FROM broker_summary").fetchone()
          print(f"Aggregating broker_summary from {min_d} to {max_d}...")

          # Delete existing foreign_flow in the broker_summary date range
          deleted = conn.execute(f"""
              DELETE FROM foreign_flow
              WHERE date >= '{min_d}' AND date <= '{max_d}'
          """).rowcount
          conn.commit()
          print(f"  Deleted {deleted:,} old foreign_flow rows in range")

          # Re-aggregate: sum Asing broker rows per ticker/date
          cur = conn.execute(f"""
              INSERT OR IGNORE INTO foreign_flow
                  (ticker, date, net_foreign_value, net_foreign_volume,
                   foreign_buy_value, foreign_sell_value)
              SELECT
                  ticker, date,
                  SUM(CASE WHEN broker_type = 'Asing' THEN net_value ELSE 0 END),
                  SUM(CASE WHEN broker_type = 'Asing' THEN net_volume ELSE 0 END),
                  SUM(CASE WHEN broker_type = 'Asing' AND net_value > 0 THEN net_value ELSE 0 END),
                  SUM(CASE WHEN broker_type = 'Asing' AND net_value < 0 THEN ABS(net_value) ELSE 0 END)
              FROM broker_summary
              GROUP BY ticker, date
          """)
          inserted = cur.rowcount
          conn.commit()
          print(f"  Inserted {inserted:,} aggregated foreign_flow rows")

          total = conn.execute("SELECT COUNT(*) FROM foreign_flow").fetchone()[0]
          min_ff, max_ff = conn.execute("SELECT MIN(date), MAX(date) FROM foreign_flow").fetchone()
          tickers = conn.execute("SELECT COUNT(DISTINCT ticker) FROM foreign_flow").fetchone()[0]
          conn.close()
          print(f"Final foreign_flow: {total:,} records | {tickers} tickers | {min_ff} → {max_ff}")
          EOF

      - name: Export foreign_flow to lean split file
        run: |
          python3 << 'EOF'
          import sqlite3, os

          SOURCE = "idx_swing_trader.db"
          PART_A = "idx_broker_part_a.db"

          if os.path.exists(PART_A):
              os.remove(PART_A)

          conn_src = sqlite3.connect(SOURCE)
          total = conn_src.execute("SELECT COUNT(*) FROM foreign_flow").fetchone()[0]
          min_d, max_d = conn_src.execute("SELECT MIN(date), MAX(date) FROM foreign_flow").fetchone()
          tickers = conn_src.execute("SELECT COUNT(DISTINCT ticker) FROM foreign_flow").fetchone()[0]
          conn_src.close()

          if total == 0:
              print("FATAL: foreign_flow is empty — refusing to create split file")
              exit(1)

          # Export via ATTACH
          conn = sqlite3.connect(SOURCE)
          conn.execute(f"ATTACH DATABASE '{PART_A}' AS dst")
          conn.execute("""
              CREATE TABLE dst.foreign_flow (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  ticker TEXT NOT NULL,
                  date TEXT NOT NULL,
                  net_foreign_value REAL,
                  net_foreign_volume REAL,
                  foreign_buy_value REAL,
                  foreign_sell_value REAL,
                  UNIQUE(ticker, date)
              )
          """)
          conn.execute("""
              INSERT INTO dst.foreign_flow
                  (ticker, date, net_foreign_value, net_foreign_volume,
                   foreign_buy_value, foreign_sell_value)
              SELECT ticker, date, net_foreign_value, net_foreign_volume,
                     foreign_buy_value, foreign_sell_value
              FROM main.foreign_flow
          """)
          conn.commit()
          conn.execute("DETACH DATABASE dst")
          conn.close()

          # Vacuum the lean file
          sqlite3.connect(PART_A).execute("VACUUM").connection.close()

          size_mb = os.path.getsize(PART_A) / 1024 / 1024
          print(f"idx_broker_part_a.db: {total:,} foreign_flow rows | {tickers} tickers | {min_d} → {max_d} | {size_mb:.1f} MB")

          if size_mb > 95:
              print(f"WARNING: file is {size_mb:.1f} MB — approaching GitHub 100 MB limit")
          EOF

      - name: Remove old split files from git if present
        run: |
          git rm --cached idx_broker_part_b.db idx_broker_part_c.db idx_broker_part_d.db 2>/dev/null || true
          rm -f idx_broker_part_b.db idx_broker_part_c.db idx_broker_part_d.db

      - name: Commit split file to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add idx_broker_part_a.db
          git diff --staged --stat
          ROWS=$(python3 -c "import sqlite3; print(f\"{sqlite3.connect('idx_broker_part_a.db').execute('SELECT COUNT(*) FROM foreign_flow').fetchone()[0]:,}\")")
          git commit -m "chore: update foreign_flow split file — ${ROWS} records"
          git push

name: Analyze Mega Winners Patterns

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mega-analysis
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install yfinance pandas openpyxl numpy sqlalchemy

      - name: Download idx-database artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          name: idx-database
          workflow_conclusion: success
          if_no_artifact_found: warn

      - name: List downloaded files
        run: |
          echo "=== Downloaded files ==="
          ls -lah *.db 2>/dev/null || echo "No .db files found"
          ls -lah idx_swing_trader.db 2>/dev/null || echo "idx_swing_trader.db not found"

      - name: Run mega winners pattern analysis
        run: python scripts/analyze_mega_winners.py

      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mega-winners-pattern-analysis
          path: mega_winners_pattern_analysis.xlsx
          retention-days: 90

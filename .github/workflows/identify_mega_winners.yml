name: Identify Mega Winners

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mega-winners
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install yfinance pandas openpyxl

      - name: Run mega winners analysis
        run: python scripts/identify_mega_winners.py

      - name: Upload analysis results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mega-winners-analysis
          path: mega_winners_analysis.xlsx
          retention-days: 90

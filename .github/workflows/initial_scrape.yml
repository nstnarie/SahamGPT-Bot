name: Initial Data Scrape

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
        default: "2021-01-01"
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true
        default: "2025-12-31"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore existing database
        uses: actions/download-artifact@v4
        with:
          name: idx-database
          path: .
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scrape historical data
        run: |
          python main_backtest.py \
            --scrape \
            --start ${{ github.event.inputs.start_date }} \
            --end ${{ github.event.inputs.end_date }} \
            --output reports

      - name: Check database has data
        id: check_data
        run: |
          python3 << 'EOF'
          import sqlite3, os
          try:
              conn = sqlite3.connect("idx_swing_trader.db")
              count = conn.execute("SELECT COUNT(*) FROM daily_prices").fetchone()[0]
              conn.close()
              print(f"daily_prices rows: {count}")
              if count > 0:
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write("has_data=true\n")
              else:
                  print("WARNING: No price data found")
                  with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                      f.write("has_data=false\n")
          except Exception as e:
              print(f"DB check error: {e}")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("has_data=false\n")
          EOF

      - name: Save database
        if: steps.check_data.outputs.has_data == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: idx-database
          path: idx_swing_trader.db
          retention-days: 90
          overwrite: true

      - name: Save backtest reports
        uses: actions/upload-artifact@v4
        with:
          name: initial-backtest-reports
          path: reports/
          retention-days: 90

      - name: Send confirmation to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import os, requests
          token = os.getenv('TELEGRAM_BOT_TOKEN', '')
          chat = os.getenv('TELEGRAM_CHAT_ID', '')
          if token and chat:
              requests.post(
                  f'https://api.telegram.org/bot{token}/sendMessage',
                  json={'chat_id': chat, 'text': 'IDX Swing Trader: Initial data scrape complete!', 'parse_mode': 'HTML'},
                  timeout=30,
              )
          "

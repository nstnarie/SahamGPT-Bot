name: Analyze Trade Log

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Backtest start date"
        required: true
        default: "2024-01-01"
      end_date:
        description: "Backtest end date"
        required: true
        default: "2024-12-31"
      capital:
        description: "Starting capital (IDR)"
        required: true
        default: "1000000000"
      # real_broker removed — real Asing broker data is always used
      min_pnl_pct_winner:
        description: "Min pnl_pct to count as big winner (%)"
        required: false
        default: "15"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install openpyxl tabulate

      - name: Download database artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          name: idx-database
          path: .
          if_no_artifact_found: warn
          workflow: initial_scrape.yml
          workflow_conclusion: success
        continue-on-error: true

      - name: Check if database exists
        id: check_db
        run: |
          if [ -f idx_swing_trader.db ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Get latest split files from main
        if: steps.check_db.outputs.exists == 'true'
        run: |
          git fetch origin main
          git checkout origin/main -- idx_broker_part_a.db
        continue-on-error: true

      - name: Restore foreign_flow from split file
        if: steps.check_db.outputs.exists == 'true'
        run: |
          python3 << 'EOF'
          import sqlite3, os

          DB = "idx_swing_trader.db"
          PART_A = "idx_broker_part_a.db"

          if not os.path.exists(PART_A):
              print("Split file not found — proceeding without foreign flow data")
              exit(0)

          conn_a = sqlite3.connect(PART_A)
          tables = [r[0] for r in conn_a.execute("SELECT name FROM sqlite_master WHERE type='table'").fetchall()]
          conn_a.close()

          if "foreign_flow" not in tables:
              print(f"idx_broker_part_a.db has no foreign_flow table (tables: {tables}) — skipping")
              exit(0)

          split_count = sqlite3.connect(PART_A).execute("SELECT COUNT(*) FROM foreign_flow").fetchone()[0]
          min_d, max_d = sqlite3.connect(PART_A).execute("SELECT MIN(date), MAX(date) FROM foreign_flow").fetchone()
          print(f"Split file: {split_count:,} foreign_flow records | {min_d} → {max_d}")

          conn = sqlite3.connect(DB)
          conn.execute("""
              CREATE TABLE IF NOT EXISTS foreign_flow (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  ticker TEXT NOT NULL,
                  date TEXT NOT NULL,
                  net_foreign_value REAL,
                  net_foreign_volume REAL,
                  foreign_buy_value REAL,
                  foreign_sell_value REAL,
                  UNIQUE(ticker, date)
              )
          """)
          conn.commit()

          db_count = conn.execute("SELECT COUNT(*) FROM foreign_flow").fetchone()[0]
          print(f"Main DB foreign_flow: {db_count:,} records")

          if db_count >= split_count:
              print("Main DB already has sufficient foreign_flow data — skipping restore")
              conn.close()
              exit(0)

          print("Restoring foreign_flow from split file...")
          conn.execute(f"ATTACH DATABASE '{PART_A}' AS ff_db")
          cur = conn.execute("""
              INSERT OR IGNORE INTO foreign_flow
                  (ticker, date, net_foreign_value, net_foreign_volume,
                   foreign_buy_value, foreign_sell_value)
              SELECT ticker, date, net_foreign_value, net_foreign_volume,
                     foreign_buy_value, foreign_sell_value
              FROM ff_db.foreign_flow
          """)
          print(f"  Inserted: {cur.rowcount:,} records")
          conn.commit()
          conn.execute("DETACH DATABASE ff_db")
          total = conn.execute("SELECT COUNT(*) FROM foreign_flow").fetchone()[0]
          conn.close()
          print(f"Final foreign_flow: {total:,} records")
          EOF

      - name: Backfill missing price data
        run: |
          python3 << 'EOF'
          import sqlite3, time, os
          import yfinance as yf
          from datetime import date, timedelta, datetime

          DB = "idx_swing_trader.db"

          backtest_start = "${{ github.event.inputs.start_date }}"
          backtest_end = "${{ github.event.inputs.end_date }}"
          warmup_dt = datetime.strptime(backtest_start, "%Y-%m-%d").date() - timedelta(days=150)
          warmup_start = warmup_dt.strftime("%Y-%m-%d")
          scrape_start = "2020-01-01"  # always scrape from 2020 for warmup

          print(f"Backtest: {backtest_start} to {backtest_end}, warmup from {warmup_start}")

          conn = sqlite3.connect(DB)
          conn.execute("""
              CREATE TABLE IF NOT EXISTS daily_prices (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  ticker TEXT NOT NULL,
                  date TEXT NOT NULL,
                  open REAL, high REAL, low REAL, close REAL,
                  volume REAL, value REAL, adj_close REAL,
                  UNIQUE(ticker, date)
              )
          """)
          conn.execute("""
              CREATE TABLE IF NOT EXISTS index_daily (
                  id INTEGER PRIMARY KEY AUTOINCREMENT,
                  index_code TEXT NOT NULL DEFAULT 'IHSG',
                  date TEXT NOT NULL,
                  open REAL, high REAL, low REAL, close REAL, volume REAL,
                  UNIQUE(index_code, date)
              )
          """)
          conn.commit()

          # Find tickers missing price data in the target window
          # Use foreign_flow as ticker universe (real Asing data, pre-aggregated)
          ff_count = conn.execute("SELECT COUNT(*) FROM foreign_flow").fetchone()[0] if "foreign_flow" in [r[0] for r in conn.execute("SELECT name FROM sqlite_master WHERE type='table'").fetchall()] else 0
          if os.path.exists(DB) and ff_count > 0:
              missing = conn.execute(f"""
                  SELECT DISTINCT f.ticker FROM foreign_flow f
                  LEFT JOIN (
                      SELECT DISTINCT ticker FROM daily_prices
                      WHERE date >= '{warmup_start}' AND date <= '{backtest_end}'
                  ) d ON f.ticker = d.ticker
                  WHERE d.ticker IS NULL ORDER BY f.ticker
              """).fetchall()
              missing = [r[0] for r in missing]
          else:
              # No broker data — scrape LQ45 universe
              missing = ["AALI","ACES","ADRO","AKRA","AMRT","ANTM","ARNA","ASII","BBCA","BBNI",
                         "BBRI","BBTN","BBYB","BMRI","BNGA","BRIS","BRPT","BUKA","CPIN","CUAN",
                         "DOID","DSNG","EMTK","ENRG","ESSA","EXCL","GGRM","GOTO","HRUM","ICBP",
                         "INCO","INDF","INKP","INTP","ISAT","ITMG","JSMR","KLBF","LINK","LSIP",
                         "MAPI","MBMA","MDKA","MEDC","MIKA","MNCN","MTEL","MYOR","PANI","PGEO",
                         "PGAS","PTBA","PTPP","PTRO","RAJA","SMGR","SMRA","SRTG","TINS","TLKM",
                         "TOWR","UNTR","UNVR","WIFI"]

          conn.close()

          if not missing:
              print("All tickers have price data — skipping scrape")
          else:
              print(f"Scraping {len(missing)} tickers from Yahoo Finance...")
              conn = sqlite3.connect(DB)
              for ticker in missing:
                  yf_ticker = f"{ticker}.JK"
                  try:
                      df = yf.Ticker(yf_ticker).history(
                          start=scrape_start, end=date.today().isoformat(), auto_adjust=False
                      )
                      if df.empty:
                          continue
                      df = df.reset_index()
                      df.columns = [c.lower().replace(" ", "_") for c in df.columns]
                      date_col = "date" if "date" in df.columns else "datetime"
                      df["date"] = df[date_col].apply(
                          lambda x: x.strftime("%Y-%m-%d") if hasattr(x, "strftime") else str(x)[:10]
                      )
                      if "adj_close" not in df.columns:
                          df["adj_close"] = df["close"]
                      df["value"] = df["close"] * df["volume"]
                      df = df.dropna(subset=["close"])
                      inserted = 0
                      for _, row in df.iterrows():
                          try:
                              conn.execute("""
                                  INSERT OR IGNORE INTO daily_prices
                                      (ticker, date, open, high, low, close, volume, value, adj_close)
                                  VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?)
                              """, (ticker, row["date"],
                                    float(row.get("open") or 0), float(row.get("high") or 0),
                                    float(row.get("low") or 0), float(row.get("close") or 0),
                                    float(row.get("volume") or 0), float(row.get("value") or 0),
                                    float(row.get("adj_close") or row.get("close") or 0)))
                              inserted += 1
                          except Exception:
                              pass
                      conn.commit()
                      print(f"  {ticker}: {inserted} rows")
                      time.sleep(0.5)
                  except Exception as e:
                      print(f"  {ticker}: failed — {e}")
              conn.close()

          # IHSG backfill
          conn = sqlite3.connect(DB)
          ihsg_count = conn.execute(f"""
              SELECT COUNT(*) FROM index_daily
              WHERE index_code = 'IHSG' AND date >= '{warmup_start}' AND date <= '{backtest_end}'
          """).fetchone()[0]
          conn.close()

          if ihsg_count > 100:
              print(f"IHSG: {ihsg_count} rows in window — skipping")
          else:
              print("Backfilling IHSG...")
              try:
                  df = yf.Ticker("^JKSE").history(
                      start=scrape_start, end=date.today().isoformat(), auto_adjust=False
                  )
                  df = df.reset_index()
                  df.columns = [c.lower().replace(" ", "_") for c in df.columns]
                  date_col = "date" if "date" in df.columns else "datetime"
                  df["date"] = df[date_col].apply(
                      lambda x: x.strftime("%Y-%m-%d") if hasattr(x, "strftime") else str(x)[:10]
                  )
                  df = df.dropna(subset=["close"])
                  conn = sqlite3.connect(DB)
                  for _, row in df.iterrows():
                      try:
                          conn.execute("""
                              INSERT OR IGNORE INTO index_daily
                                  (index_code, date, open, high, low, close, volume)
                              VALUES (?, ?, ?, ?, ?, ?, ?)
                          """, ("IHSG", row["date"],
                                float(row.get("open") or 0), float(row.get("high") or 0),
                                float(row.get("low") or 0), float(row.get("close") or 0),
                                float(row.get("volume") or 0)))
                      except Exception:
                          pass
                  conn.commit()
                  conn.close()
                  print(f"IHSG: done")
              except Exception as e:
                  print(f"IHSG failed: {e}")
          EOF

      - name: Run backtest
        run: |
          python main_backtest.py \
            --start ${{ github.event.inputs.start_date }} \
            --end ${{ github.event.inputs.end_date }} \
            --capital ${{ github.event.inputs.capital }} \
            --output reports \

      - name: Analyze trade log
        run: |
          python3 << 'PYEOF'
          import pandas as pd
          import numpy as np
          import os, json
          from datetime import datetime

          BW_THRESHOLD = float("${{ github.event.inputs.min_pnl_pct_winner }}")
          START = "${{ github.event.inputs.start_date }}"
          END = "${{ github.event.inputs.end_date }}"

          csv_path = "reports/trade_log.csv"
          if not os.path.exists(csv_path):
              print("No trade log found — backtest may have failed")
              exit(1)

          df = pd.read_csv(csv_path)
          if df.empty:
              print("Trade log is empty")
              exit(0)

          df["pnl"] = pd.to_numeric(df["pnl"], errors="coerce")
          df["pnl_pct"] = pd.to_numeric(df["pnl_pct"], errors="coerce")
          df["holding_days"] = pd.to_numeric(df["holding_days"], errors="coerce")
          df["entry_date"] = pd.to_datetime(df["entry_date"])
          df["exit_date"] = pd.to_datetime(df["exit_date"])
          df["month"] = df["entry_date"].dt.to_period("M")

          winners = df[df["pnl"] > 0]
          losers = df[df["pnl"] <= 0]
          big_winners = df[df["pnl_pct"] >= BW_THRESHOLD]
          quick_fails = df[(df["exit_reason"].isin(["STOP_LOSS", "EMERGENCY_STOP"])) & (df["holding_days"] <= 8)]
          slow_fails = df[(df["exit_reason"].isin(["STOP_LOSS", "EMERGENCY_STOP"])) & (df["holding_days"] > 8)]
          non_stop = df[~df["exit_reason"].isin(["STOP_LOSS", "EMERGENCY_STOP"])]

          lines = []
          lines.append(f"# Trade Log Analysis: {START} → {END}")
          lines.append(f"Generated: {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}")
          lines.append("")

          # ── Overview ──
          total_pnl = df["pnl"].sum()
          gross_win = winners["pnl"].sum() if len(winners) else 0
          gross_loss = abs(losers["pnl"].sum()) if len(losers) else 0
          pf = gross_win / gross_loss if gross_loss > 0 else float("inf")

          lines.append("## Overview")
          lines.append(f"| Metric | Value |")
          lines.append(f"|--------|-------|")
          lines.append(f"| Total trades | {len(df)} |")
          lines.append(f"| Winners | {len(winners)} ({len(winners)/len(df)*100:.1f}%) |")
          lines.append(f"| Losers | {len(losers)} ({len(losers)/len(df)*100:.1f}%) |")
          lines.append(f"| Total PnL | Rp {total_pnl:+,.0f} |")
          lines.append(f"| Profit Factor | {pf:.2f} |")
          lines.append(f"| Avg win | Rp {winners['pnl'].mean():,.0f} | " if len(winners) else "| Avg win | N/A |")
          lines.append(f"| Avg loss | Rp {losers['pnl'].mean():,.0f} | " if len(losers) else "| Avg loss | N/A |")
          lines.append(f"| Avg hold | {df['holding_days'].mean():.1f} days |")
          lines.append(f"| Big winners (≥{BW_THRESHOLD:.0f}%) | {len(big_winners)} |")
          lines.append("")

          # ── Exit reason breakdown ──
          lines.append("## Exit Reason Breakdown")
          lines.append("| Exit Reason | Trades | WR | Total PnL | Avg PnL% |")
          lines.append("|-------------|--------|----|-----------|---------|")
          for reason, grp in df.groupby("exit_reason"):
              wr = (grp["pnl"] > 0).mean() * 100
              total = grp["pnl"].sum()
              avg_pct = grp["pnl_pct"].mean()
              lines.append(f"| {reason} | {len(grp)} | {wr:.0f}% | Rp {total:+,.0f} | {avg_pct:+.1f}% |")
          lines.append("")

          # ── Failure analysis ──
          lines.append("## Failure Analysis")
          lines.append(f"| Category | Count | PnL | Avg PnL% | Avg Hold |")
          lines.append(f"|----------|-------|-----|---------|---------|")
          if len(quick_fails):
              lines.append(f"| Quick failures (SL/EMG ≤8d) | {len(quick_fails)} | Rp {quick_fails['pnl'].sum():+,.0f} | {quick_fails['pnl_pct'].mean():+.1f}% | {quick_fails['holding_days'].mean():.1f}d |")
          if len(slow_fails):
              lines.append(f"| Slow failures (SL/EMG >8d) | {len(slow_fails)} | Rp {slow_fails['pnl'].sum():+,.0f} | {slow_fails['pnl_pct'].mean():+.1f}% | {slow_fails['holding_days'].mean():.1f}d |")
          if len(non_stop):
              wr_ns = (non_stop["pnl"] > 0).mean() * 100
              lines.append(f"| Non-stop exits | {len(non_stop)} | Rp {non_stop['pnl'].sum():+,.0f} | {non_stop['pnl_pct'].mean():+.1f}% | WR {wr_ns:.0f}% |")
          lines.append("")

          # ── Holding day distribution of stops ──
          stops = df[df["exit_reason"].isin(["STOP_LOSS", "EMERGENCY_STOP"])]
          if len(stops):
              lines.append("## Stop-Loss Day Distribution")
              lines.append("| Hold Day | Count | Total PnL |")
              lines.append("|----------|-------|-----------|")
              for day, grp in stops.groupby("holding_days"):
                  lines.append(f"| Day {int(day)} | {len(grp)} | Rp {grp['pnl'].sum():+,.0f} |")
              lines.append("")

          # ── Big winners ──
          lines.append(f"## Big Winners (pnl_pct ≥ {BW_THRESHOLD:.0f}%)")
          if len(big_winners):
              lines.append("| Ticker | Entry | Exit | Hold | PnL% | Exit Reason |")
              lines.append("|--------|-------|------|------|------|------------|")
              for _, t in big_winners.sort_values("pnl_pct", ascending=False).iterrows():
                  lines.append(f"| {t['ticker']} | {str(t['entry_date'])[:10]} | {str(t['exit_date'])[:10]} | {int(t['holding_days'])}d | {t['pnl_pct']:+.1f}% | {t['exit_reason']} |")
          else:
              lines.append(f"No trades with pnl_pct ≥ {BW_THRESHOLD:.0f}%")
          lines.append("")

          # ── Worst losers ──
          lines.append("## Worst Losers (bottom 10 by pnl_pct)")
          lines.append("| Ticker | Entry | Exit | Hold | PnL% | Exit Reason |")
          lines.append("|--------|-------|------|------|------|------------|")
          for _, t in df.nsmallest(10, "pnl_pct").iterrows():
              lines.append(f"| {t['ticker']} | {str(t['entry_date'])[:10]} | {str(t['exit_date'])[:10]} | {int(t['holding_days'])}d | {t['pnl_pct']:+.1f}% | {t['exit_reason']} |")
          lines.append("")

          # ── Monthly PnL ──
          lines.append("## Monthly PnL")
          lines.append("| Month | Trades | WR | PnL | PF |")
          lines.append("|-------|--------|----|-----|-----|")
          for month, grp in df.groupby("month"):
              wr = (grp["pnl"] > 0).mean() * 100
              wins_m = grp[grp["pnl"] > 0]["pnl"].sum()
              loss_m = abs(grp[grp["pnl"] <= 0]["pnl"].sum())
              pf_m = wins_m / loss_m if loss_m > 0 else float("inf")
              lines.append(f"| {month} | {len(grp)} | {wr:.0f}% | Rp {grp['pnl'].sum():+,.0f} | {pf_m:.2f} |")
          lines.append("")

          # ── Holding days histogram ──
          lines.append("## Holding Period Distribution")
          lines.append("| Days | Count | WR | Avg PnL% |")
          lines.append("|------|-------|-----|---------|")
          bins = [(1,3),(4,5),(6,8),(9,12),(13,20),(21,999)]
          for lo, hi in bins:
              grp = df[(df["holding_days"] >= lo) & (df["holding_days"] <= hi)]
              if len(grp):
                  wr = (grp["pnl"] > 0).mean() * 100
                  avg_pct = grp["pnl_pct"].mean()
                  label = f"{lo}-{hi}d" if hi < 999 else f"{lo}+d"
                  lines.append(f"| {label} | {len(grp)} | {wr:.0f}% | {avg_pct:+.1f}% |")
          lines.append("")

          # ── Sector breakdown ──
          if "sector" in df.columns and df["sector"].notna().any():
              lines.append("## Sector Breakdown")
              lines.append("| Sector | Trades | WR | PnL |")
              lines.append("|--------|--------|----|-----|")
              for sector, grp in df.groupby("sector"):
                  wr = (grp["pnl"] > 0).mean() * 100
                  lines.append(f"| {sector} | {len(grp)} | {wr:.0f}% | Rp {grp['pnl'].sum():+,.0f} |")
              lines.append("")

          # ── Ticker frequency ──
          lines.append("## Most Traded Tickers")
          lines.append("| Ticker | Trades | WR | Total PnL |")
          lines.append("|--------|--------|----|-----------|")
          for ticker, grp in df.groupby("ticker"):
              wr = (grp["pnl"] > 0).mean() * 100
              lines.append(f"| {ticker} | {len(grp)} | {wr:.0f}% | Rp {grp['pnl'].sum():+,.0f} |")
          lines.append("")

          report = "\n".join(lines)

          os.makedirs("reports", exist_ok=True)
          with open("reports/trade_analysis.md", "w") as f:
              f.write(report)

          print(report)
          PYEOF

      - name: Analyze signal quality
        run: |
          pip install scipy -q
          python scripts/analyze_signal_quality.py \
            --trade-log reports/trade_log.csv \
            --output reports/signal_quality_analysis.md \
            --big-winner-pct ${{ github.event.inputs.min_pnl_pct_winner }}
        continue-on-error: true

      - name: Create Excel trade log
        run: |
          python3 << 'PYEOF'
          import pandas as pd, os
          from openpyxl.utils import get_column_letter

          csv_path = "reports/trade_log.csv"
          if not os.path.exists(csv_path):
              exit(0)

          df = pd.read_csv(csv_path)
          if df.empty:
              exit(0)

          df = df.sort_values("entry_date")
          for col in ["entry_price", "exit_price", "pnl", "entry_cost", "exit_proceeds"]:
              if col in df.columns:
                  df[col] = pd.to_numeric(df[col], errors="coerce").round(0)
          if "pnl_pct" in df.columns:
              df["pnl_pct"] = pd.to_numeric(df["pnl_pct"], errors="coerce").round(2)

          with pd.ExcelWriter("reports/trade_log.xlsx", engine="openpyxl") as writer:
              df.to_excel(writer, sheet_name="Trades", index=False)
              ws = writer.sheets["Trades"]
              for col_idx, col in enumerate(df.columns, 1):
                  max_len = max(len(str(col)), df[col].astype(str).str.len().max())
                  ws.column_dimensions[get_column_letter(col_idx)].width = min(max_len + 3, 25)

          print(f"Excel: {len(df)} trades")
          PYEOF

      - name: Upload analysis artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trade-analysis-${{ github.event.inputs.start_date }}-to-${{ github.event.inputs.end_date }}
          path: |
            reports/trade_analysis.md
            reports/signal_quality_analysis.md
            reports/metrics_summary.txt
            reports/trade_log.csv
            reports/trade_log.xlsx
            reports/equity_curve.png
            reports/drawdown.png
            reports/monthly_heatmap.png
            reports/trade_distribution.png
          retention-days: 90
